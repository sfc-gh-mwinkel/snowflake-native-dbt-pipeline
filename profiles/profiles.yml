default:
  outputs:

    prod:
      type: snowflake
      account: ""        # Snowflake session context — leave empty
      user: ""           # Snowflake session context — leave empty
      warehouse: TRANSFORM_WH          # replace with your warehouse
      database: ANALYTICS              # replace with your database
      schema: dbt_prod
      role: dbt_prod_role              # replace with your prod role
      threads: 4
      query_tag: dbt_prod

    check:
      type: snowflake
      account: ""        # Snowflake session context — leave empty
      user: ""           # Snowflake session context — leave empty
      warehouse: TRANSFORM_WH          # replace with your warehouse
      database: ANALYTICS              # replace with your CI database
      schema: "dbt_pr_{{ var('pr_number', 'ci') }}"
      role: dbt_ci_role                # replace with your CI role
      threads: 4
      query_tag: dbt_ci

  target: prod
