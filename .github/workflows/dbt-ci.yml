name: dbt CI (Snowflake-native)

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  dbt-ci:
    name: dbt build (CI)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DBT_PROJECT_FQN: ${{ secrets.DBT_PROJECT_FQN }}
      SNOWFLAKE_CONNECTIONS_CI_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_CONNECTIONS_CI_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_CONNECTIONS_CI_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_CONNECTIONS_CI_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_CONNECTIONS_CI_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_CONNECTIONS_CI_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - name: Install Snowflake CLI
        uses: Snowflake-Labs/snowflake-cli-action@v1
        with:
          cli-version: latest

      - name: Seed CI schema
        run: |
          cat > /tmp/seed.sql <<EOF
          EXECUTE DBT PROJECT $DBT_PROJECT_FQN
            args='seed --target check --vars {pr_number: $PR_NUMBER}';
          EOF
          snow sql --connection ci -f /tmp/seed.sql

      - name: Build and test (CI)
        run: |
          cat > /tmp/build.sql <<EOF
          EXECUTE DBT PROJECT $DBT_PROJECT_FQN
            args='build --target check --vars {pr_number: $PR_NUMBER}';
          EOF
          snow sql --connection ci -f /tmp/build.sql
